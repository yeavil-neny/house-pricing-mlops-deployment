name: Continuous Integration & Deployment (GCP Dev) 🚀

# El pipeline se activa automáticamente ante cualquier 'push' en la rama dev
on:
  push:
    branches:
      - dev

jobs:
  # TRABAJO 1: Asegurar la calidad antes de tocar la nube
  test-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v3

      - name: Configurar entorno de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias del proyecto
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Autenticar en Google Cloud con Workload Identity 🔐
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: 'proyectomachinelearning-498323'

      # Descarga directa en la raíz del espacio de trabajo de GitHub
      - name: Descargar Datos de Prueba y Modelo desde el Bucket
        run: |
          gcloud config set project proyectomachinelearning-498323
          gcloud storage cp gs://house-pricing-mlops-artifacts-dev/models/model_house_pricing.onnx ./model_house_pricing.onnx
          gcloud storage cp gs://house-pricing-mlops-artifacts-dev/data/test_data.csv ./test_data.csv

      - name: Ejecutar pruebas unitarias y de umbral de calidad (Pytest)
        run: |
          export PYTHONPATH="."
          pytest tests/test_main.py

  # TRABAJO 2: Empaquetar y Desplegar en Cloud Run (Solo si el Trabajo 1 pasa en verde)
  build-and-deploy-gcp:
    needs: test-and-validate
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v3

      # 1. Autenticación nativa mediante Workload Identity Federation
      - name: Autenticar en Google Cloud con Workload Identity 🔐
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: 'proyectomachinelearning-498323'

      # 2. DESCARGA DEL MODELO (Para alimentar el Dockerfile)
      # Descargamos el artefacto directamente en la raíz (.) del runner para que docker build lo encuentre
      - name: Descargar Modelo ONNX para el Contexto de Docker 🎯
        run: |
          gcloud storage cp gs://house-pricing-mlops-artifacts-dev/models/model_house_pricing.onnx ./model_house_pricing.onnx

      # 3. Configuración de credenciales de Docker en el entorno limpio
      - name: Configurar autenticación de Docker y Despliegue en GCP
        run: |
          gcloud config set project proyectomachinelearning-498323
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # 4. Construcción utilizando el contexto local completo
      - name: Construir y Subir Imagen de Desarrollo a Artifact Registry
        run: |
          # Extraer el hash corto del commit
          COMMIT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_BASE="us-central1-docker.pkg.dev/proyectomachinelearning-498323/house-pricing-repo/house-pricing-api"
          
          # Construir la imagen de manera agnóstica
          docker build -t $IMAGE_BASE:$COMMIT_SHA -t $IMAGE_BASE:dev .
          
          # Subir ambas etiquetas
          docker push $IMAGE_BASE:$COMMIT_SHA
          docker push $IMAGE_BASE:dev

      # 5. Despliegue final de la API empaquetada
      - name: Desplegar endpoint en Google Cloud Run (DEV)
        run: |
          COMMIT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_BASE="us-central1-docker.pkg.dev/proyectomachinelearning-498323/house-pricing-repo/house-pricing-api"
          
          gcloud run deploy house-pricing-api-dev \
            --image $IMAGE_BASE:$COMMIT_SHA \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars ENVIRONMENT=dev

# Relanzamiento: Permisos WIF y mapeo OIDC actualizados con éxito