name: Continuous Integration & Deployment (GCP Dev) 🚀

on:
  push:
    branches:
      - dev

jobs:
  # TRABAJO 1: Descarga dinámica y Pruebas Unitarias de Calidad
  test-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v3

      - name: Configurar entorno de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias del proyecto
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Autenticación requerida para acceder al Bucket en la etapa de Test
      - name: Autenticar en Google Cloud con Workload Identity 🔐
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v1

      # CUMPLIMIENTO DE LA RÚBRICA: Descarga limpia de artefactos
      - name: Descargar Datos de Prueba y Modelo desde el Bucket
        run: |
          gcloud storage cp gs://house-pricing-mlops-artifacts-dev/models/model_house_pricing.onnx /tmp/model_house_pricing.onnx
          gcloud storage cp gs://house-pricing-mlops-artifacts-dev/test_data.csv /tmp/test_data.csv

      # Apuntamos directamente al archivo que muestra tu VS Code
      - name: Ejecutar pruebas unitarias y de umbral de calidad (Pytest)
        run: |
          export PYTHONPATH="."
          pytest tests/test_main.py

  # TRABAJO 2: Empaquetar y Desplegar en Cloud Run
  build-and-deploy-gcp:
    needs: test-and-validate
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v3

      - name: Autenticar en Google Cloud con Workload Identity 🔐
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v1

      - name: Configurar autenticación de Docker con GCP
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Construir y Subir Imagen a Artifact Registry
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/house-pricing-repo/api-dev:latest .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/house-pricing-repo/api-dev:latest

      - name: Desplegar endpoint en Google Cloud Run
        run: |
          gcloud run deploy house-pricing-api-dev \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/house-pricing-repo/api-dev:latest \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars ENVIRONMENT=dev